body:
  text: 跋徳莊名噪乾淳間官至朝請大夫直寶文閣知建寧府軍府事賜紫金魚袋恩遇甚隆而度量宏博常戒趙忠定公曰謹勿以一魁先置胸中可想見其大槩矣余家舊藏介庵詞一巻板甚精良惜未得其佳集又有文寳雅詞四巻中誤入孫夫人咏雪詞又曽見琹趣外篇六巻章次顛倒舊作頗多不能悉舉至如席上贈人清平樂昔人稱為集中之冦反逸去可恨坊本之亂真也湖南毛晉識
