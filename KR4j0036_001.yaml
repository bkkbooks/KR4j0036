body:
  text: 介菴詞宋趙彦端撰醉蓬萊梅向蓬萊雲𣺌姑射山深有春長好香滿枝南笑人間驚早試問寒柯鏤氷裁玉費化工多少東閤詩成西湖夢覺㡬番清曉好是羅幃麝溫屏煗却恨煙村雨愁風惱一一清芬為東君傾倒待得明年翠隂青子䕃鳯皇池沼更把陽和從頭付與繁花芳草滿江紅荼䕷千種繁春春巳去翩然無迹誰信道荼䕷枝上静中收得曉鏡洗粧非粉白晩衣弄舞餘衫碧粲寳鈿珠珥不勝持濃隂夕金翦度還堪惜霜蝶睡無從覓知多少清夢釀成氷骨天女散花無酒聖仙人種玉慚香徳悵攀條記得鬢絲青東風客又餞前政盧光祖赴鼎州幕席上作津鼓鼕鼕三老醉知誰留得都不記琵琶洲畔草青江碧桃李春風吹不斷煙霞秋興清無極悵樽前桂子有餘香曽相識殘雨晝初涼夕髙燭爛新醅白長歌斷歡意不如愁色父老能尋循吏傳闗河暫枉諸侯客待日邉一紙詔黄飛勝相憶又汪秘監席上作賜被􅝪爐曽同見官槐重緑時歸看綺疏叠嶂楚腰翻曲君過蓬山輕嵗月我懐廬阜分符竹道别離待得再歸來人應俗春欲動醅初熟追一笑森三玉且相㸔青眼共裁紅燭小語人家閒意態淺寒都下新装束念平生和雨醉東風從今足水調歌頭秀州坐上作秋色忽如許風露皎如空平生青鬢餘地老與故人同憶得鱸魚來後雜以洞庭新橘月墮酒盃中賔客可人意歌舞轉春風坐間玉花底扇又從容從容更好無奈多病已衰翁頼有主人風味識我少年狂態乞與酒顔紅一醉曉鴉起流水任西東又為夀淦水定何許樓外滿晴嵐落霞蜚鳥無際新酒為誰甘聞道居鄰玉笥下有芝田琳苑光景照江南巳轉丹砂九應降素雲三憶疇昔翻舞袖縱劇談玉壺傾倒香霧黄菊釀紅柑好在當時明月只有爐􅝪一縷緘寄可同參賸肯南遊不逢海試窮探瑞鶴仙為夀記河梁折栁問畫堂樂事燕鴻難偶十年漫回首但亭亭紫盖差差南斗傳聞小有種桃花親煩素手怪歸來道骨仙風縹緲逈然非舊清晝江南如畫紫菊冬前翠橙霜後扁舟渡口佳客至奉名酒喚青鸞起舞雲窓月檻一曲山明水秀笑相㸔玉海别來淺如故否又餞交代沈公雅臺山寺作繼作朝中措攬垂楊細折有别情遺愛與君都説文茵帶琱軛是行春來處去年阡陌柔桑半葉轉風光輕颺秀麥正人家共約耕相借牛社相留客清絶溪山猶記脱㡌吟風倚樓招月東君何事将春至放春歇道從今江上一花一栁皆想油幢瑞節縦離愁痩減腰圍帯金正曄朝中措山礬風味更梨花清白競春華試問西園清夜何如山崦人家楚東千嶂呉江一棹雲路非賒惟有相思兩地可憐淡月朝霞又燒燈巳過禁烟前春信遞相傳栁暗乍迷津霧花暄欲照江天天涯賓主相逢老矣一笑歡然晩嵗許同廬社西風不買呉舩又東風亭初成長松擎月與天通霜葉亂驚鴻露炯乍疑盃􅗷雲生似覺衣重江南勝䖏青環楚嶂紅半溪楓倦客㑹應歸去一亭長枕寒空又幾枝笻竹半烟雲鐘鼓醉中聞千㸃好山餘思一灣流水能分多情皓月栖輪夜午光動風文看取清閒賓主猶勝富貴封君又路彦豐生日新涼溪閣暮山重水月共空濛九轉不湏塵外三峯只在壺中他年盛業雲間可望林下難逢記取薌林岩洞何如干越秋風又西城烟霧一重重瀟洒便秋風巧妒玉人裝髻無如禁鑰難通新聲窈𦕈怨傳楚些嬌並呉宫夜乆三星為粲皓蛾寜為君容新荷葉欲暑還涼如春有意重歸春若歸來任他鶯老花飛輕雷澹雨似晩風欺得單衣簷聲驚醉起来新緑成圍回首分攜光風冉冉菲菲曾幾何時故山疑夢還非鳴琹再撫将清恨都入金徽永懐橋下繫舩溪柳依依又雨細梅黄去年雙燕還歸多少繁紅盡随蝶舞蜂飛隂濃緑暗正麥秋猶衣羅衣香凝沉水雅宜簾幙重圍繡扇仍攜花枝塵染芳菲遥想當時故交徃徃人非天涯再見悅情話景仰清徽可人懷抱晩期蓮社相依又秀州作玉井氷壺人間有此清秋笑語雍容令從庭户初修迎風待月香凝處四捲簾鉤月波竒觀未饒當日南樓聞説三吳江湖從古風流況有雙轓舊譜黄閣青油金甌屢啓應難解乆為人留天池波灧可憐蘋滿汀洲看花回張守生日注目正江湖浩蕩烟雲離屬美人衣蘭佩玉澹秋水凝神陽春翻曲烹鮮坐嘯清淨五千言自足横劍氣南斗光中浩然一醉引雙鹿回雁未歸書未續夢草處舊芳重緑誰憶瀟湘歳晩為喚起長風吹飛黄鵠功名異時圮上家傳謝寵辱待封留拜公堂下授我長生籙又為夀居東岩龎藴士也愛日報疎梅動意春前呼得畫棟曉開壽域度百和温馨霜華無力斑衣翠袖人面年年照酒色環四座璧月瓊枝恍然江縣擬鄉國聞道撫東岩舊迹又殊勝謝家清逸知與桃花笑了定何似青鳥層城消息他年妙髙峯上優曇㑹堪折擁輕軒未妨遊戲看取朱輪十芰荷香席上用韻送程徳逺罷金谿燕初歸正春陰暗淡客意淒迷玉觴無味晩花雨退凝脂多情細栁對沈腰渾不勝衣垂别袖忍見離披江南陌上强半紅飛樂事從今一夢縱錦囊空在金椀誰揮舞裙歌扇故應閒瑣幽閨練江詩就算檥舟寧不相思腸斷莫訴離盃青雲路穩白首心期垂絲釣干越亭路彦捷置酒同别富南叔短篷醉艤江南秋意如水露草星明風栁絲委危檻倚為故人宴喜歡無㡬念青鞵紫綺論詩載酒猶勝心記雙鯉倦游晩矣雲路非吾事湖海從君意沙雁起記夜䦨隠几又莫愁有信全勝春夢無準篆縷欲銷衣粉堪認殘夢醒枕夜涼滿鬢想香逕正垂垂美蔭晩花在否朱闌誰與同凭斷雲怨冷青鳥無憑問紅葉翻成恨三五近試預占破鏡謁金門題扇朱檻曲粧淺鬢雲吹緑半尺鵝溪涼意足手香霑柄玉午夢已驚難續説與翠梧修竹蓬海路遙天六六椉鸞何處逐又勞顧曲燕妒雅羞衣緑魯酒不能無味足小盃空薦玉只願此歡常續莫序水邊絲竹明日朝參同趁六猶期歸騎逐又休相憶明夜逺如今日樓外緑烟村羃羃花飛如許急栁岸晩來舩集波底斜陽紅溼送盡去雲成獨立酒醒愁又入又春已半繡緑新紅如換燕子還來簾幙畔閒愁天不管翠被曲屏香滿花葉彩牋人逺鵲喜蛛絲都未判連環空約腕又春不盡處處與情相趁誰道劉郎家恁近一年花不問雙剪畫羅春勝今夜月圓如鏡怎得酒䦨心易定試將金液鎮又春似繡不是别離時候滴盡黄昏殘刻漏月髙花影晝好在畫屏金獸深瑣粉牕蘭牖溪水南來堪問否㡬時離渡口又朱户密鎮鎖一庭春日畫幕黄簾芳草碧遊蜂初未識脆管么絃無力青子緑隂如織花滿深宫無路入舊遊渾記得又春意密不受人間風日一曲清歌雲莫碧樽前今夜識醉客倦吟無力滯夢停愁相織只道桃源難再入有人還問得栁梢青生日衰翁自謫堪笑忘了山林閒適一歳花黃一秋酒緑一番頭白浮生似醉如客問底事歸來未得但願長年故人相與春朝秋夕又庚寅生日鈆山作巵言日出天上漫試人間無術一笑歸來身如蟬蜕首如龜縮年年白酒黃花共願我光風霽月不道道人駸駸老去如何消得又酴醿過也酴醿過後無花堪折只有垂楊垂楊却作絮驚行色海棠半在如無又争倩薔薇戀得除是東風隨君歸問玉堂消息好事近椉風亭作君莫厭江鄉也有茂林修竹竹外有些亭榭置酒樽棊局棊神酒聖各成歡歡長更燒燭寄語故人鵬鷃任傾金圍玉又送林主簿君到共黄花君去早梅將發君不待梅歸去問與誰同折白頭潘令一年秋有酒恨無客莫忘道山堂上話清音風月又盧僉判席上草草復囱囱相見也還相憶記取夢魂詩思似水光山色清音堂下一扁舟誰主又誰客休厭一盃相勸看梅梢將白又晩集後圜尋得一枝春驚動小園花月把酒放歌添燭看連林争發從今日日有花開野水釀春碧舊日愛閒陶令作江南狂客又白雲亭風露入新亭看盡楚天秋色行到暮霞明處有金華僊刻孤城喬木墮荒涼白雲帶溪碧喚取小舟同醉話江湖歸日又蠟梅一種歳前春誰辨額黄腮白風意只吟羣木與此花修别此花佳處似佳人髙情帶詩格君與歳寒相許有芳心難結又朱户閉東風春在小紅纖雪門外未寒猶㬉怪有花堪折梨花菊蘂不相饒嬌黄帶輕白莫厭醉歌相惱是中原鄉客又日日念江東何有舊人重説二妙一時相遇怪樽前頭白山城無物為君歡薄酒待寒月草草數歌休笑似主人衰拙㸃絳唇路徳友席上作山水鄉中豈知還有中原笑醉歌傾倒記得昇平調舊日年光試把華燈照心情好有些懐抱擬向梅花道又一㸃青陽早梅初識春風面暖回瓊管斗自東方轉白馬青袍莫作銅駝戀看宫線但長相見愛日如人願又護雨烘晴紫雲縹緲來深院晚寒誰見紅杏梢頭怨絶代佳人萬里沈香殿光風轉夢餘千片猶恨相逢淺又秋入䦨干亭亭波面虹千丈一聲漁唱畫箇三髙樣江上風波更泛吴松浪寒潮漲石魚酒舫漫叟知何向又題西隱好在蒼苔摩挲遺恨風還雨一涼相與片月生新浦天外離居為我蓀橈舉山如許故人來否歳晩鱸堪煮秦樓月詠瑞香香䔩蔌小山叢桂烘温玉烘温玉酒愁花暗沈腰如束煩君􅓑與陽春曲為君細拂衾羅馥衾羅馥一春幽夢與君相續又梅綴雪雪綴梅花肌膚愜肌膚愜豐姿濃態瑩如玉色嵗寒期約無相缺祥花不减晴空月晴空月依前消痩還共清絶阮郎歸歳寒堂下兩株梅商量先後開春前日遶一千回花來春又來冰可斷玉堪裁寒空無暖埃為君翻動臘前醅酒醒香滿懐又一春種得牡丹成那知君遽行東君也自沒心情夜來風雨聲追間闊數清明不應歌渭城只愁河畔草青青却須離緒生又餘干留别人家三年何許競芳辰君家千樹春如今欲去復逡巡好花留住人紅蘂亂緑陰匀綵雲新又新只因小闋記情親動君梁上塵減字木蘭花贈摘阮者四絃續續山水依然闗塞足天上新聲謫墮人間得自名清歌宛轉彈向指間依舊見滿眼春風不覺黄梅細雨中又緑隂紅雨暗淡衣裳花下舞花月佳時舞破東風第㡬枝一盃相屬從灺樽前三四燭酒盡花䦨京洛風流仔細看又一年歌舞還是花黄樽緑處雨横風多比似年時恨若何簾深酒暖細雨斜風渾不管只有黄花欲近佳人鬢畔鴉又送人南浦日日客亭風又雨相見如何梅子枝頭春已多真成别去酒病明朝知㡬許淋損宫袍都是人人醉後嬌又屈亭湘浦怨盡朝雲還暮雨知是誰何賦得清愁爾許多愛來慵去此意生平成浪許著盡茸袍想見江梅雪後嬌又亂雲縈浦做雪不成還是雨知我為何一笑仍添一恨多不須歸去琥珀盃深能㡬許草色如袍記取從今舞處嬌鵲橋仙來時夾道紅羅步障已換青絲翠羽春愁元自逐春來却不肯隨春歸去千觴美酒十分幽事歸到只愁風雨憑誰傳語牡丹花為做取東君些主又正月廿三日秀雅堂作江梅仙去蠟梅風化只有緗梅呈秀不知春在阿誰邊試與問青青楊栁小園幽事中都風味鬭草分香如舊東風莫漫送扁舟為管取輕寒羅袖又送路勉道赴長樂留花翠幕添香紅袖常恨情長春淺南風吹酒玉虹翻便忍聽離絃聲斷椉鸞寳扇凌波微步好在清池涼館直饒書與茘枝來問纖手誰傳冰盌又紅白二色蓮藕花塘上無塵無暑灧灧一池秋韻緑羅寳葢碧瓊竿翠浪裏亭亭月影一家姊妹兩般梳洗濃淡施朱傅粉夜深風露逼人寒問誰在牙牀酒醒菩薩蠻同飲晁伯如家席上和韓旡咎韻雪中梅艷風前竹詩縁漸與情縁熟醉眼眩成花惱伊生臉霞巫雲將楚雨只恐翻然去我有合歡盃為君聊挽回又雨聲不斷垂簷竹清歌喚起清眠熟洞戸有餘花同傾細細霞酒行如過雨雨盡風吹去吹去復盈盃一春能㡬回又繡羅裙上雙鴛帶年年長繫春心在梅子别時青如今渾已成美人書幅幅中有連環玉不是只催歸要情無斷時又倚闌閒撚生綃扇新涼庭户微風轉疎雨斷簷聲淡雲開晩晴蔗漿寒浸齒枕簟清如水相憶不勝愁月來簾上鈎又集句青春背我堂堂去桃花亂落如紅雨是妾斷腸時芳心空自持相思君助取脈脈如牛女天逺莫江遲今宵歸不歸蝶戀花贈别趙邦才席上作堂外溪橋楊栁畔滿樹東風更著流鶯喚時節清明寒暖半秦筝欲妒歌珠貫一寸離腸無可斷舊管新收盡記雙帷卷賴得今年春較晚送人猶有餘紅亂又雪裏珠衣寒未動雪後清寒驚損幽帷夢風撼海牛簾幕重畫簷冰筯如流汞一穂香雲佳客共溜溜金槽政爾新詞送酒戲詩䰗忘百中燭間有箇人非衆琴調相思引臨别餘千席上作拂拂輕隂雨麴塵小庭深幕墮嬌雲好花無㡬猶是洛陽春燕語似知懐舊主水生只解送行人可堪詩墨和淚漬羅巾又曾躡姑蘇城上臺好山知有好人來㡬回徙倚月裏莫雲開閒倚和風千步栁倦臨殘雪一枝梅暖香髙燭翻動道人灰杏花天風韶雨潤催花候歎無限年年常有桃蹊杏陌相期乆一為東君試手囱囱去那人信否襟淚漬粉香依舊單衣煮酒重來後好與看承人痩又當時衆裏聞新曲拚一醉移舟換燭清波快送千帆幅十里披烟泛玉誰知度春寒夜獨常寄恨花闌漏促西風渡口蓮堪東一枕新涼㑹足浣溪沙題扇冰練新裁月見羞墨花飛作淡雲浮宜歌宜笑不妨秋約腕半籠衫草碧洗粧初失黛蛾愁嫩涼輕暑奈風流又過雨園林緑漸濃晩霞明處莫雲重小橋東畔再相逢睡起未添雙鬢緑汗融微退小粧紅㡬多心事不言中又菊已開時梅未通似寒如煖意融融情親語妙一盃中歌舞欲來須更理林泉有樂政須同好詩多味酒無功又渺渺東風泛酒舩月華為地酒為川春于紅藥更留連雲路功名方步步草廬松竹自年年他時人説二疏賢又花下憑看月下迎避人私語臉霞生畫堂紅燭意盈盈病酒一春愁與睡倚䦨終日雨還晴强移心緒作清明又辛夘㑹黄運屬席上作人意歌聲欲度春春容温煖勝於人勸君一醉酒如澠梅子枝頭應有恨栁花風底不堪嚬葢公堂下浄無塵虞美人九月飲椉風亭故基烟空磴盡長松語佳處遺基古道人椉月又椉風未用秋衣沈水換薰籠兩峯千澗依稀是想像詩翁醉莫驚青蕊後時開笑倒江南陶令未歸來又凌虛風馬來無迹水浄山光出松間孤鶴睡殘更喚起緱簫飛去與雲平新亭聊共豐年悦一醉中秋月江山擬作畫圖臨樂府翻成終勝寫無聲又罷官嘉禾張忠甫諸公置酒舟中作蘭畦梅逕香雲繞長恨相從少相從雖少却情親不道相從頻後是行人行人未去猶清瘦想見相分後書來梅子定嘗新記取江東日暮雨還雲南鄉子同韓子東飲汪徳召新樓風露晩珊珊洛下湘中接珮環急把一盃相勞苦雲端只恐氷肌亦自寒二客共闌干瀲瀲鯨波吸未乾待得月華移十丈椉歡更上層樓極處看又濃緑暗芳洲春事都隨芍藥休風雨只貪梅子熟颼颼却送行人一夜秋新月幸如鈎二五還催玉鑑浮一段離愁溪樣逺悠悠只是溪流淺似愁又集句牕户映朝光花氣渾如百和香即遣花飛深造次茫茫曲渚飄成錦一張相憶莫相忘並蒂芙蓉本自雙草色連雲人去住堪傷海上尖峯似劍鋩畫堂春飲趙淵卿容光堂倡條繁蔕緑層層解衫扶醉同登暝雲無樹亦崚嶒紅袖深憑病思去春饒睡醉魂因酒思氷夜涼星斗挂修甍歌盡香凝又滿城風雨近重陽夾衫清潤生香好辭賡盡楚天長喚得花黄客勝不知門陋酒新如趁春狂故人相見等相忘一語千觴滴滴金送路彦捷赴儀真澄溪暝度輕澌白對平湖澹烟隔我與征鴻共行人更張燈留客東園半是餘花迹料仙帆到時發若倚江樓望清淮為殷勤鄉國青玉案贈勉道琵琶人當年萬里龍沙路載多少離愁去冷壓層簾雲不度芙蓉雙帶垂楊嬌髻絃索初調處花凝玉立東風莫曾記江邊麗人句異縣相逢能㡬許多情誰料琵琶洲畔同醉清明雨沙塞子春水緑波南浦漸理棹行人欲去黯消魂栁上輕烟花梢微雨長亭放􅊦無計住但芳草迷人去路忍回頭斷雲殘日長安何處臨江仙和洪景盧送行韻憶著舊山歸去樂松筠歳晚參天老來慵似栁三眠從教官府冷甘作地行仙青瑣紫微追昨夢扁舟已具猶憐有情如酒月如川為君忘飲病更擬索茶煎又席上次元明韻潦水似譏酒淺秋雲如妒蟾明幽人聞雁若聞鶯更長端有意菊晚近無情詩學笑中偷換燭花醉裏頻傾羅衣迥立可憐生五湖雖好在客意欲登瀛鷓鴣天白鷺亭作天外秋雲四散飛波間風艇一時歸他年淮水東邊月猶為登臨替落暉誇客勝數星稀晩寒拂拂動秋衣酒行不盡清光意輸與漁舟睡釣磯又送王漕侍郎奏事渺𣺌東風拂畫船不堪臨雨落花前清歌只擬留春住好語頻聞有詔傳秦望月鏡湖天養成英氣自當年兩山總是經行處獻納雍容定㡬篇又為韓漕无咎壽憶醉君家倚翠屏年年相喜鬢毛青誰知緩步從天下猶許清彈此地聽揮羽扇寫鵞經使星何似老人星㡬時一試薰風手今日桐隂又滿庭清平樂建安泛舟作新寒一段變盡人間暖説與羣花花不管只有江梅情亂江梅也似山人山人到老梅親斗擻衣冠氣象百般歸去精神又席上贈人思花菴作閨桃根桃葉一樹芳相接春到江南三二月迷損東家蝴蝶殷勤踏取青陽風前花正低昂與我同心支子報君百結丁香眼兒媚建安作儂家風物似山家梅老鬢絲華㡬回記得攀翻琪樹醉帽欹斜冷香不斷春千里歸路本非賒有人郤道使君猶健看徧餘花永遇樂陪程金谿躍馬用其韻杜曲桑麻灞橋風雪歸夢無路馬健凌秋人閒玩日聊用寛遲莫搖搖羽扇翩翩鳬舄勝處恍疑仙去笑相看風林露草古來有誰知趣黄公壚下山隂亭畔歳月著鞭如騖出塞功名入闗游説紙上俱難據論詩説劍尊前風味天巧却容人覷問少陵酣歌拓㦸為誰獻賦訴衷情雨中㑹飲賞梅燒燭花杪洗粧僛舞傍清樽霏雨澹黄昏殷勤與花為地燒燭助微温松半嶺竹當門憶山村明朝酒醒桃李漫山心事誰論又江梅初試兩三花人意竟年華春工未敢輕放深院擁吴娃翻酒戲醉人家舊生涯而今且趁便面斜陽莫照紅紗千秋歳杏花風下獨立春寒夜微雨度疎星挂暉暉濃艷出嫋嫋繁枝亞朱檻倚輕羅醉裏添還卸寂寞情猶乍悵望驂鸞駕衣褪玉香欺麝一花拚一醉盃重憑誰把春去也重簾翠幙人如畫風入松杏花傳聞天上有星榆歴歴誰居淡烟莫擁紅雲暖春寒乍有還無作態似深仍淺多情要密還疎移樽環坐足相娱醉影憑扶江南歸到雖憐晩猶勝不見踟躇儘拚緑隂青子憑肩攜手如初茶瓶兒上元澹月華燈春夜送東風栁烟梅麝寳釵宫髻連嬌馬似記得帝鄉游冶悦親戚之情話況溪山坐中如畫凌波微步人歸也看酒醒鳳鸞誰跨祝英臺近春恨獸金寒簾玉潤梅雪印苔絮春意如人易散苦難聚㡬多絲竹深情池塘幽夢猶倚賴與春同住舊遊處誰喚别浦仙帆風前問征路烟雨連江吹恨正無數莫教紫燕歸來彩雲開後空悵望主人輕去五綵結同心為淵卿夀人間塵斷雨外風回涼波自泛仙槎非郭還非壄閒鶯燕時傍笑語清佳銅壺花漏長如線金鋪碎香煗簷牙誰知道東園五畆種成國艷天葩主人漢家龍種正翩翩迥立雪紵烏紗歌舞承平舊圍紅袖詩興自寫春華未知三斗朝天去何似鴻寶丹砂且一醉朱顔相慶共看玉井浮花瑞鷓鴣為嬸夀芙蓉池館一重重留得黄花壽斚中春到小春如有信日臨良月正相同芝蘭美應瑤堦瑞蘋藻香吹翠沼風此夜隔牆聞鳳管人間元自勝蟾宫月中桂送杜仲微赴闕露醑無情送長歌未終已醉離别何如莫雨釀一襟涼潤來留佳客好山侵座碧勝昨夜疎星淡月君欲翩然去人間底許員嶠問帆席詩情病非疇昔賴親朋對影且慰良夕風流雨散定㡬回腸斷能禁頭白為君煩素手薦碧藕輕絲細雪去去江南路猶應水雲秋共色滿庭芳道中憶錢塘舊遊雲暖萍漪雨香蘭逕西湖二月初時兩山十里錦繡照金羈栁外闌干相望弄東風倚遍斜暉朋遊好亂紅堆裏一飲百篇詩三年江上夢青衫風日白紵塵泥聽㡬聲黄鳥粤樹閩溪長是春朝多病今年更添得相思須歸去倦遊滋味猶有个人知水龍吟春溪漠漠如空望中只與新愁去何知尚有烟間餘怨洛津閒賦已瘦難豐乆離重見好春如許念海棠未老荼䕷欲吐且莫恨風嫌雨休問無情水驛載幽懐小橈輕艣君看睡起平堦栁絮入門花霧才盡無竒客殘如埽一樽誰舉悵行雲斷後祗應夢裏有澄江句如夢令酥花鴛瓦初凝霜粟氷笋旋裁春玉巧思化東風喚省蕊紅枝緑清淑清淑㑹有蜂棲蝶宿又嫩栁眉梢輕蹙細草烟凝堪掬争似小桃穠酒入香肌紅玉清馥清馥不覺花闌漏促蕊珠閒浦雲融梅風斷碧水無情輕度有嬌黄上林梢向春欲舞緑烟迷晝淺寒欺莫不勝小樓凝佇倦遊處故人相見易阻花事從今堪數片帆無恙好在一篙新雨醉袍宫錦畫羅金縷莫教恨傳幽句念奴嬌雨斜風横正詩人閒倦淮山清絶彈壓秋光江萬頃只欠凌波羅襪好事幽人怜予止酒著意温瓊雪翠帷低巻怪來飛墮初月涼夜華宇無塵舞裙香漸暖錦茵聲闋不分金蓮隨步步誰遣芙蓉争發賴得髙情湘歌洛賦稱作西風客為君留住不然飄去雲闕憶少年逢春如酒逢花如露逢人如玉東風送寒去蔚温温香縠海上三山元似粟試招來共藏金屋與君醉千歳看人間新緑思佳客令天似水秋到芙蓉如亂綺芙蓉意與黄花倚歴歴黄花矜酒美清露委山間有箇閒人喜惜分飛送江鳴玉歸烏墪相與十年親且舊一笑天涯㩦手霜際寒雲逗去年情味君思否逺水無情氷不就好在樽前眉岫腸斷東南秀淡烟疎月梅花候絳都春别張子儀平生相遇算未有笑語閩山佳處舊日文章如今風味渾如許眼前都是蓬萊路但莫道有人曾住異時天上風流種種待君如故此自君家舊物看九萬清風為君掀舉舉上青雲却憶梅花如舊否故人衰病今無緒只種得梅花盈圃待君一過山家共斟露醑小重山春日歸來如許長不知償此意㡬何觴老人臨酒興猶狂溪山主終不道山王一雨罷耕桑平生歡喜處是吾鄉與君花底共風光春莫笑花不似人香隔浦蓮西風吹斷蘿草來度芙蓉老座上人誰在晨參疎影相照幽館寒意早簷聲小玉山拚醉倒秋屏曉相㩦勝處黄花香滿烏帽如今將見璧月瓊枝空好準擬新歌待見了不道些兒心事還惱賀聖朝一江風月同君住了不知秋去賞心亭下過帆如馬墮楓如雨相將莫問興亡事舉離觴誰訴垂楊指㸃但歸來有温柔佳處念奴嬌建安餞交代沈公雅棠隂緑遍正金菊芙蓉争放時節滿路歌謠民五袴底事逢車催發結綵成門攀轅卧轍何計留連得故園花栁盡成顦顇難説今夜祖席郵亭主人來日已是朝天客旌斾囱囱從此去去賞南湖風月眷戀無因笑啼不敢那忍傷輕别瀛洲難駐一盃聊送行色㸃絳唇途中逢管倅顦顇天涯故人相遇情如故别離何遽忍唱陽闗句我是行人更送行人去愁無據寒蟬鳴處回首斜陽莫轉調踏沙行路宜人生日宿雨纔收餘寒尚力牡丹將綻也近寒食人間好景算仙家也惜因循盡掃斷蓬萊跡舊日天涯如今咫尺一月五番相共歡集些兒夀酒且莫留半滴一百二十箇好生日瑞鶴仙氣佳哉夀域正曉松呈翠早梅施白良辰值良月看景星朝覩洗空霜潔珍圖瑞牒仰天心鍾在俊傑向人間化作如膏甘雨莫放春歇堪憶三吳樂事畫㦸凝香舞衣回雪風流勝絶樽中酒坐中客問今年何事騎鯨南去乆矣湘楓下葉早歸來應取千齡鳳池舊列看花回端有恨留春無計花飛何速檻外青青翠竹鎮髙節凌雲清隂常足春寒風袂帶雨穿牕如利鏃催處處燕巧鶯慵㡬聲鈎輈叫雲木看波面垂楊蘸緑最好是風流烟沐隂重熏簾未捲正泛乳新芽香飄清馥新詩恵我開巻醒然欣再讀歎詞章過人華麗擲地勝如金玉好事近一沮寄江干十載山青水碧山水大無餘意有故情難識故情難識有誰知衣殘更頭白别後是人安穩只楚吳行客賀聖朝河陽桃李開無數待成春歸去小園㡬月忽驚飛恨主人難駐雛鶯乳燕愁悲語道留君不住願君隨處作東風與羣花為主浣溪沙張宜興生日花縣雙鳬縹緲仙家庭椿樹正蒼然斑衣舉酒大人前嫋嫋涼風供扇枕悠悠飛露溼叢萱醉扶黄髪弄曾𤣥又水到桐江鏡樣清有人還似水清明樽前無語更盈盈翠袖舞衫何日了白頭歸去㡬時成老來猶有惜花情菩薩蠻佩環解處粧初了翠娥玉面金鈿小萼緑本仙家天香誰似他芳心真耐乆度月長相守歳晩未能忘相期雲水鄉眼兒媚王漕赴介菴賞梅黄昏小宴史君家梅粉試春華暗香素蕊横枝疎影月淡風斜更燒紅燭枝頭挂粉蠟鬭香奢元宵近也小園先試火樹銀花江城子上張帥春風旗鼓石頭城急麾兵斬長鯨緩帶輕裘乗勝討蠻荆螘聚蜂屯三十萬争面縛向行營舳艫千里大江横凱歌聲犬羊驚尊俎風流談笑酒徐傾北望旄頭今已滅河漢淡兩台星西江月為夀搗玉揚珠萬户膴眉髙髻千峰佳辰請夀黒頭公老稚扶擕歡動借問優游黄綺何如强健䕫龍觥舩一棹百分空澆潑胸中雲夢千秋歳外姑生日柏舟髙躅晩歳宜遐福門户壯疎湯沐青袍圍白髪瑞錦纒犀軸仙桂長交柯却映蟠桃熟縹緲長生曲入破笙簫逐香霧薄菲華屋玉鈎涼月挂水麝秋蕖馥千萬夀酒中倒卧南山緑虞美人斷蟬髙栁斜陽處池閣絲絲雨緑檀珍簟卷猩紅屈曲杏花蝴蝶小屏風春山疊疊秋波慢收拾殘針綫又成嬌困倚檀郎無事更抛蓮子打鴛鴦又劉帥生日疎梅淡月年年好春意今年早迎長時節近佳辰看取衮衣黄髪畫麒麟酒中倒卧南山緑起舞人如玉風流椿樹可憐生長與栁枝桃葉共青青瑞鷓鴣榴花五月眼邊明角簟流氷午夢清江上扁舟停畫漿雲間一笑濯塵纓主人盃酒留連意倦客闗河去住情都付郵亭今日水伴人東去到江城豆葉黄粉牆丹柱栁絲中簾箔輕明花影重午醉醒來一面風緑蔥蔥㡬顆櫻桃葉底紅念奴嬌中秋姮娥萬古算清光常共山清水緑我欲蓬萊風露頂眇視寰瀛一粟㩦手羣仙廣寒遊戲玉砌琉璃屋歸來一笑葛陂還訪騎竹此夕縱飲清歡吸寒輝萬丈快如飛瀑傾倒銀河斟斗杓莫問人間榮辱獨倚闌干浩歌長嘯驚墮雲飛鵠亂呼蟾兎搗霜為駐顔玉水調歌頭山色望中好秋氣一番晴連峰疊巘極目髙下與雲平三洞沈沈何處玉清洞在溪水中隠映一溪烟樹倒影碧波清喚起驂鸞客丹竈夜光横簾半捲風不動月初明佳人為我垂手悽怨理秦筝千載虹橋新路依約幔亭歌舞一醉話浮生但得樽盈酒莫問世間名臨江仙賞芙蓉十載長安桃李夢年來鏡浄塵空忽傳綵筆小牋紅滿懐秋思傾倒為芙蓉莫恨霜濃開較晩樽前元有春風酣嬌肯為别人容試㩦銀燭斜照緑波中喜遷鶯登山臨水正桂嶺瘴開蘋洲風起𤣥鶴髙翔蒼鷹逺擊白鷺欲飛還止江上澄波似練沙際行人如蟻目斷處見遙峰蹙翠殘霞浮綺千里闗塞逺雁陣不來猶把闌干倚數疊悲笳一行征斾城郭幾番成毁白㙮前朝寢陵青嶂故都營壘念往事但寒烟滿目秋蟬盈耳鷓鴣天羊城舊名京口天下最號都㑹風軒月館艷姬角妓倍於他所人以羣仙目之因列十名於後各賦一闋蕭秀有女青春正及笄蕊宫仙子下瑤池簫吹弄玉登樓月絃撥昭君未嫁時雲體態栁腰肢綺羅活計强偎隨天教謫入羣花苑占得東風第一枝蕭瑩花動儀容玉潤顔温柔嫋娜趁幽閒盈盈醉眼横秋水淡淡蛾眉抹逺山膏雨霽曉風寒一枝紅杏拆朱闌天台迥失劉郎路因憶前縁到世間歐懿月晃金箆雲膩梳素娥何事下天衢翩翩舞袖穿花蝶宛轉歌喉貫索珠簾翡翠枕珊瑚錦衾氷簟水紋鋪春光九十羊城景百紫千紅總不如桑雅雲暗青絲玉瑩冠笑生百媚入眉端春深芍藥和烟拆秋曉芙蓉破露看星眼俊月眉灣舞狂花影上闌干醉來直駕仙鸞去不到銀河到廣寒劉雅醉撚花枝舞翠翹十分春色賦妖嬈千金笑裏争檀板一搦纖圍間舞腰行也媚坐也嬌乍離銀闕下青霄檀郎若問芳笄記二月和風弄栁條歐倩梅粉新粧間玉容夀陽人在水晶宫浴殘雨洗梨花白舞轉風搖菡萏紅雲枕席月簾櫳金爐香噴鳳幃中凡材縱有凌雲格肯學文君一旦蹤文秀綽約嬌波二八春㡬時飄謫下紅塵桃源寂寂啼春鳥蓬島沈沈鎖莫雲丹臉嫩黛眉新肯將朱粉汚天真楊妃不似才卿貌也得君王寵愛勤王婉未有年光好破𤓰緑珠嬌小翠環了清肌瑩骨能香玉艷質英姿解語花釵揷鳳髻堆鴉舞腰春栁受風斜有時馬上人争看擘破紅牕新絳紗楊蘭兩兩青螺綰額傍彩雲齊㑹下巫陽俱飛蛺蝶元相逐並蒂芙蓉本自雙翻綵袖舞霓裳點風飛絮恣輕狂花神只恐留難住早晩承恩入未央吴玉拂拂深帷起暗塵清歌緩響自回春月和燈市雲間墮人對梅花雪後新盃掌露舞衣雲酒慵微覺翠鬟傾洞房不厭陽臺雨乞與游人弄晩晴總詠一簇神仙㑹見竒漫誇蘇小與西施憐輕鏤月為歌扇喜薄裁雲作舞衣牙板脆玉音齊落霞天外雁行低看看各得風流侣回首乘鸞舊路歸介菴詞
