body:
  text: 介菴詞詞曲類一詞集之屬提要臣等謹案介菴詞一卷宋趙彥端撰彥端字德莊號介菴魏王廷美七世孫乾道淳熙間以直寶文閣知建寧府終左司郎官宋史藝文志彥端有介菴集十卷外集三卷又有介菴詞四卷馬端臨經籍考則僅稱介菴詞一卷此本為毛晉所刻亦止一卷與通考合然據其卷後跋語似又舊刻散佚僅存此一卷者未之詳也彥端嘗賦西湖謁金門有波底斜陽紅濕之句為髙宗所喜有我家裡人也會作此等語之稱其他篇亦多婉約纖穠不愧作者集末鷓鴣天十闋乃為京口角妓蕭秀蕭瑩歐懿桑雅劉雅歐倩文秀王婉楊蘭吳玉九人而作詞格凡猥皆無足取且連名入之集中殆于北里之志殊乖雅音蓋唐宋以來士大夫不禁狎斜之遊彥端是作蓋亦移于習俗存而不論可矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3c994d525bee0856e0205d5fc88f4c9547187cce129082c00fa95e8f74b6a918
